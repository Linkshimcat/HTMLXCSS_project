<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이윤재의 홈페이지</title>
    <style>
        #container {
            width: 1000px;
            margin: 20px auto;
        }
        h1 {
            text-shadow: 1px 2px 25px rgb(255, 104, 247);
            color: rgb(246, 112, 134);
            text-align: center;
        }
        .prod-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .prod-list li {
            position: relative;
            float: left;
            padding: 0;
            margin: 10px;
            overflow: hidden;
        }
        .prod-list img {
            width: 300px;
            height: 200px;
            margin: 0;
            padding: 0;
            float:left;
            z-index: 5;
            border: 1px solid black;
            border-radius: 16px;
        }
        .prod-list .caption {
            position: absolute;
            top:200px;
            width:300px;
            height:200px;
            padding-top: 20px;
            background:rgba(255, 86, 252, 0.6);
            border-radius: 16px;
            opacity: 0;
            -moz-transition: all 0.2s ease-in-out;
            -o-transition: all 0.2s ease-in-out;
            -webkit-transition: all 0.2s ease-in-out;
            transition: all 0.2s ease-in-out;
            z-index: 10;
        }
        .prod-list li:hover .caption {
            opacity: 1;
            border-radius: 16px;
            -moz-transform: translateY(-200px);
            -ms-transform: translateY(-200px);
            -o-transform: translateY(-200px);
            -webkit-transform: translateY(-200px);
            transform: translateY(-200px);

        }
        .prod-list .caption h2, .prod-list .caption p {
            color: #fff;
            text-align: center;
        }

    </style>
</head>
<body>
    <h1>신상품 목록</h1>
    <div id="container">
    <ul class="prod-list">
        <li>
            <img src="images/t1.jpg">
            <div class="caption">
            <h2>딩동핑 1</h2>
            <p>딩 1 설명 텍스트</p>
            <p>가격: 12,345원</p>
            </div>
        </li>
        <li>
            <img src="images/t2.jpg">
            <div class="caption">
            <h2>티니핑 마카롱가게 2</h2>
            <p>티니핑 마카롱가게 2 설명 텍스트</p>
            <p>가격: 33,333원</p>
            </div>
        </li>
        <li>
            <img src="images/t3.jpg">
            <div class="caption">
            <h2>레전드 티니핑 3</h2>
            <p>레전드 티니핑 3 설명 텍스트</p>
            <p>가격: 99,999원</p>
            </div>
        </li>
    </ul>
    </div>
</body>
</html>
