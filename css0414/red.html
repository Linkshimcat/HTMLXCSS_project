<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS04414-Test3</title>

    <style>
        body {
            font-style: 20px; /* 전체 글자 크기 */
        }
        h1 {
            font-family: 바탕;  /* 글꼴 */
            font-size: 3em;    /* 글자 크기 */
        }
        .accent {
            font-size: 150%;   /* 글자 크기 */
            font-width: 800;   /* 글자 굵기 */
            color:red;
        }
        .italic {
            font-style: italic;    /*글자 스타일 */
        }
    </style>
</head>
<body>
    <h1 style="text-decoration:none">레드향</h1> <!--none은 텍스트에 줄을 표시하지 않음-->
    <p style="text-decoration:underline">껍질에 붉은 빛이 돌아<span class="accent">레드향</span>이라 불린다.</p> <!-- underline은 텍스트 밑줄 표시 -->
    <p class="accent" style="text-decoration:overline">레드향은 한라봉과 귤을 교배한 것으로</p> <!--overline은 텍스트 윗줄에 표시-->
    <p class="italic" style="text-decoration:line-through">일반 귤보다 2~3배 크고, 과육이 붉고 통통하다.</p> <!--line through은 취소선 표시-->


</body>
</html>
