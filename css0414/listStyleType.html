<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listStyleType</title>
    <style>
        .book1 {
            list-style-type: none; /* 불릿이나 숫자를 없애는 스타일 */
        }
        .book2 {
            list-style-type: upper-alpha; /* 알파벳 소문자 스타일 */
        }
    </style>
</head>
<body>
    <h1>도서 시리즈</h1>
    <ul class="book1"> <!--순서가 없는 리스트-->
        <li>Do it! 시리즈</li>
        <li>첫 코딩 시리즈</li>
        <li>된다 시리즈</li>      
    </ul>
    <ol class="book2"> <!--순서가 있는 리스트-->
        <li>Do it! 시리즈</li>
        <li>첫 코딩 시리즈</li>
        <li>된다 시리즈</li>   
    </ol>
    
</body>
</html>
