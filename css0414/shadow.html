<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow CSS</title>

    <style>
        .shadow1 {
            color: red;
            text-shadow: 1px 1px black; /* 가로, 세로거리, 색상 지정 */
        }
        .shadow2 {
            text-shadow: 5px 5px 3px #ffa500; /* 가로, 세로 거리, 번짐 정도, 색상 지정 */
        }
        .shadow3 {
            color: #fff;
            text-shadow: 7px -7px 20px #000; /* 가로, 세로 거리, 번짐 정도, 색상 지정 */
        }
        .shadow4 {
            color: #098300;
            font-weight: bold;
            font-family: 바탕;
            font-size: 3rem;
            text-shadow: 7px 7px 35px #3cf200; /* 가로, 세로 거리, 번짐 정도, 색상 지정 */
        }
    </style>
</head>
<body>
    
    <h1 class="shadow1">HTML</h1>
    <h1 class="shadow2">CSS</h1>
    <h1 class="shadow3">자바스크립트</h1>
    <hr><br>
    <h1 class="shadow4">LINKSHIMCAT</h1>
</body>
</html>
