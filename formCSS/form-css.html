<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form 예제</title>
    <link rel="stylesheet" href="form-css.css">
</head>
<body>
    <form id="signup">
        <fieldset>
            <legend><b>로그인 정보🔐</b></legend>
            <ul>
                <li>
                    <label for="userid">아이디</label>
                    <input id="userid" name="userid" type="text" required></input>
                </li>
                <li>
                    <label for="pw1">비밀번호</label>
                    <input id="pw1" name="pw1" type="password" required></input>
                </li>
                <li>
                    <label for="pw2">비밀번호 확인</label>
                    <input id="pw2" name="pw2" type="password" required></input>
                </li>
                <li>
                    <label for="level">회원 등급</label>
                    <input id="level" name="level" value="준회원"readonly></input>
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend><b>개인 정보🪪</b></legend>
            <ul>
                <li>
                    <label for="fullname">이름</label>
                    <input id="fullname" name="fullname" type="text" required placeholder="5자미만 공백없이"></input>
                </li>
                <li>
                    <label for="email">메일 주소</label>
                    <input type="email" name="email" id="email" required placeholder="abcd@domain.com"></input>
                </li>
                <li>
                    <label for="tel">연락처</label>
                    <input type="tel" name="tel" id="tel" required></input>
                </li>
            </ul>
        </fieldset>

        <fieldset>
        <button type="submit" name="name">제출</button>
        </fieldset>

    </form>
</body>
</html>
