<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문양식</title>
    <style>
        h1 {color:saddlebrown}
    </style> 

</head>
<body>
    <h1>레드향 주문하기</h1>
    <form>
        <fieldset>
            <label>아이디
            <input type="text" placeholder="ID 입력" required><br>
            </label>
            <label>비밀번호
            <input type="password" placeholder="비밀번호 10자 이상 입력." required>
            </label>
        </fieldset>

        <fieldset>
            <legend>상품 선택</legend>
            <p><b>주문할 상품을 선택해 주세요.</b></p>
            <!-- <input>태그 -->
            <label><input type="checkbox" value="s_3">선물용 3kg</label>
            <input type="range" min="5" max="10"><br>
            <label><input type="checkbox" value="s_5">선물용 5kg</label>
            <input type="range" min="5" max="10"><br>
            <label><input type="checkbox" value="s_3">가정용 3kg</label>
            <input type="range" min="5" max="10"><br>
            <label><input type="checkbox" value="f_3">가정용 5kg</label>
            <input type="range" min="5" max="10"><br>
            <p><b>포장 선택</b></p>
            <label><input type="radio" name="gift" value="yes">선물 포장</label>
            <label><input type="radio" name="gift" value="no">선물 포장 안함</label>
            
        </fieldset>
          <fieldset>
            <legend>배송 정보</legend>

        <ul>
            <li>
                <label for="user-name">이름</label>
                <input type="text" id="user-name" required>
            </li>
             <li>
                <label for="addr">배송주소</label>
                <input type="text" id="addr" required>
            </li>
             <li>
                <label for="user-email">이메일 주소</label>
                <input type="email" id="user-email" required="이 입력란을 작성하세요!">
            </li>
             <li>
                <label for="phone">연락처</label>
                <input type="tel" id="phone" required>
            </li>
            <li>
                <label for="memo">메모</label>
                <textarea id="memo" cols="60" rows="6"></textarea>
            </li>
        
        </ul>

            <input type="submit" value="주문 하기">
            <input type="reset" value="취소 하기">
        </fieldset>

        
    </form>
</body>
</html>
