<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사진&Form</title>
</head>
<body>
    <h1>벚꽃 사진</h1>
    <img src = "dex23.jpeg"  width="100%" alt="벚꽃 사진">
    <audio src ="seffect.mp3" controls></audio>
    <hr>

    <form>
        <ul>
            <li>
                <label for="user-name">이름</label>
                <input type="text" id="user-name">
            </li>
             <li>
                <label for="addr">배송주소</label>
                <input type="text" id="addr">
            </li>
             <li>
                <label for="user-email">이메일 주소</label>
                <input type="email" id="user-email" required="이 입력란을 작성하세요!">
            </li>
             <li>
                <label for="phone">연락처</label>
                <input type="tel" id="phone">
            </li>

        </ul>
    </form>
</body>
</html>
