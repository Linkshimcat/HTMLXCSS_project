<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 프로필</title>
    <style>
        #container {
            width: 540px; /* 너비 */
            margin: 10px auto; /* 중앙 배치 */
            padding: 10px; /* 테두리와 내용 사이의 여백 */
            border: 1px solid #000; /* 테두리 굵기와 색깔*/
        }
        
        section { /* 내부스타일 시트 */
            font-style: italic;
            width:500px; /* 박스 크기 500px */
            padding:15px;
            border:5px solid gray;
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <!--자기소개-->
        <section>
            <h2>Who am I?</h2>
            <p>프런트엔드 웹(Front-end Web Tech.)에 관심이 많습니다.</p> <br>
            현재 제주도의 한 시골마을에서 코딩 중입니다.</p>
        </section>
    </div>
</body>
</html>
