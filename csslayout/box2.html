<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX-Shadow0416</title>
    <style>
        .commonbox {
            width: 300px; /* 고정 너비 */
            height: 100px; /* 고정 높이 */
            border-radius: 20px; /* 모서리 둥근 크기 */
        }
        .box1{
            box-shadow: 2px -2px 5px 0px;
        }
        .box2 {
            box-shadow: 5px 5px 15px 5px blue;
        }
    </style>
</head>
<body>
    <div class="box1 commonbox"></div><br> <!--div안 class는 ,를 쓰면 안됨-->
    <div class="box2 commonbox"></div>
    
</body>
</html>
