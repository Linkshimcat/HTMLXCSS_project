<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX-Style</title>
    <style>
        .commonbox {
            width: 300px; /* 고정 너비 */
            height: 100px; /* 고정 높이 */
            border:  2px solid black;
        }
        #box1 {border-width: 2px;}
        #box2 {border-width: thick thin;}
        #box3 {border-width:thick thin thin;}
        #box4 {border-width: 10px 5px 5px 10px;}
    </style>
</head>
<body>
    <div id="box1" class="commonbox"></div> <br>
    <div id="box2" class="commonbox"></div><br>
    <div id="box3" class="commonbox"></div><br>
    <div id="box4" class="commonbox"></div>
    
</body>
</html>
