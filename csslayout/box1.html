<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOX 컨텐츠</title>

    <style>
        .box1 {
            width: 400px; /* 고정 너비 */
            height: 100px; /* 고정 높이 */
            border: 1px solid black ;
            
        }
        .box2 {
            width: 50%; /* 가변 너비(사이즈 변함) - 웹 브라우저의 50% */
            height: 100px; /* 고정 높이 */
            border: 1px solid black ;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
